name: termux-npm-build-publish-x64

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref or branch to build"
        required: true
        type: string
        default: "main"
      publish_npm:
        description: "Publish npm package (@aryanxispe/codex-termux-x64)"
        required: true
        type: boolean
        default: false
      create_release:
        description: "Create or update GitHub release with packaged assets"
        required: true
        type: boolean
        default: false
      npm_tag:
        description: "npm dist-tag to use when publish_npm=true"
        required: true
        type: string
        default: "latest"
      release_tag:
        description: "Release tag override (defaults to v<package.version>-x64)"
        required: false
        type: string
        default: ""

jobs:
  meta:
    name: Resolve release metadata
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      ref_sha: ${{ steps.meta.outputs.ref_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}

      - name: Resolve version and tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 - <<'PY'
          import json
          with open('npm-package-x64/package.json', 'r', encoding='utf-8') as fh:
              print(json.load(fh)['version'])
          PY
          )"
          if [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            release_tag="${{ github.event.inputs.release_tag }}"
          else
            release_tag="v${version}-x64"
          fi
          ref_sha="$(git rev-parse HEAD)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "ref_sha=${ref_sha}" >> "$GITHUB_OUTPUT"

  build-android-x86_64:
    name: Build Android x86_64 binaries
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    needs:
      - meta
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          targets: x86_64-linux-android

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Configure Cargo for x86_64-linux-android cross-compile
        shell: bash
        run: |
          set -euo pipefail
          ndk_bin="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<EOF

          [target.x86_64-linux-android]
          linker = "${ndk_bin}/x86_64-linux-android29-clang"
          ar = "${ndk_bin}/llvm-ar"
          EOF

      - name: Build for x86_64 Android
        env:
          RUSTY_V8_FROM_SOURCE: 1
          OPENSSL_STATIC: 1
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        shell: bash
        run: |
          set -euo pipefail
          cd codex-rs
          cargo build --target x86_64-linux-android --release -p codex-cli -p codex-exec --verbose

      - name: Stage Android x86_64 binaries
        shell: bash
        run: |
          set -euo pipefail
          out="${GITHUB_WORKSPACE}/dist/android-x86_64"
          rel="${GITHUB_WORKSPACE}/dist/release-assets"
          mkdir -p "${out}" "${rel}"

          cp "codex-rs/target/x86_64-linux-android/release/codex" "${out}/codex.bin"
          cp "codex-rs/target/x86_64-linux-android/release/codex-exec" "${out}/codex-exec.bin"
          cp "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/x86_64-linux-android/libc++_shared.so" "${out}/libc++_shared.so"
          chmod +x "${out}/codex.bin" "${out}/codex-exec.bin" "${out}/libc++_shared.so"

          asset="codex-termux-android-x86_64-v${{ needs.meta.outputs.version }}.tar.gz"
          tar -C "${out}" -czf "${rel}/${asset}" codex.bin codex-exec.bin libc++_shared.so
          sha256sum "${rel}/${asset}" | awk '{print $1}' > "${rel}/${asset}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: android-x86_64-binaries
          path: dist/android-x86_64/

      - uses: actions/upload-artifact@v4
        with:
          name: android-x86_64-release-assets
          path: dist/release-assets/codex-termux-android-x86_64-v${{ needs.meta.outputs.version }}.tar.gz*

  package-npm:
    name: Pack and optionally publish npm x64 Termux package
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs:
      - meta
      - build-android-x86_64
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}

      - uses: actions/download-artifact@v4
        with:
          name: android-x86_64-binaries
          path: /tmp/android-x86_64

      - name: Inject Android x86_64 binaries into npm package
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/android-x86_64/codex.bin npm-package-x64/bin/codex.bin
          cp /tmp/android-x86_64/codex-exec.bin npm-package-x64/bin/codex-exec.bin
          cp /tmp/android-x86_64/libc++_shared.so npm-package-x64/bin/libc++_shared.so
          chmod +x npm-package-x64/bin/codex npm-package-x64/bin/codex-exec \
                   npm-package-x64/bin/codex.bin npm-package-x64/bin/codex-exec.bin \
                   npm-package-x64/bin/libc++_shared.so

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: npm pack
        id: npm_pack
        working-directory: npm-package-x64
        shell: bash
        run: |
          set -euo pipefail
          tarball="$(npm pack)"
          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: npm-termux-x64-tarball
          path: npm-package-x64/${{ steps.npm_pack.outputs.tarball }}

      - name: npm publish
        if: ${{ github.event.inputs.publish_npm == 'true' }}
        working-directory: npm-package-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish "${{ steps.npm_pack.outputs.tarball }}" --tag "${{ github.event.inputs.npm_tag }}" --access public

  release-assets:
    name: Create or update GitHub release (x64)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: ${{ github.event.inputs.create_release == 'true' }}
    needs:
      - meta
      - build-android-x86_64
      - package-npm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}

      - uses: actions/download-artifact@v4
        with:
          name: android-x86_64-release-assets
          path: dist/release-assets/android

      - uses: actions/download-artifact@v4
        with:
          name: npm-termux-x64-tarball
          path: dist/npm

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.meta.outputs.release_tag }}"
          target="${{ needs.meta.outputs.ref_sha }}"
          assets=(
            dist/release-assets/android/*
            dist/npm/*.tgz
          )

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${assets[@]}" --clobber
          else
            gh release create "${tag}" "${assets[@]}" \
              --target "${target}" \
              --title "${tag}" \
              --notes "Termux x86_64 release built from ref '${{ github.event.inputs.source_ref }}'."
          fi
